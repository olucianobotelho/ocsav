name: Update IPTV Data

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetch script
        env:
          IPTV_SERVER: ${{ secrets.IPTV_SERVER }}
          IPTV_USERNAME: ${{ secrets.IPTV_USERNAME }}
          IPTV_PASSWORD: ${{ secrets.IPTV_PASSWORD }}
        run: python scripts/fetch.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: update IPTV data $(date +%Y-%m-%d-%H:%M)"
          git push